version: '3.8'

services:
  deepsearch:
    build: .
    ports:
      - "8000:8000"
    environment:
      # 从 .env 文件读取环境变量
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_CX=${GOOGLE_CX}
      - SERPER_API_KEY=${SERPER_API_KEY}
      - SERPAPI_API_KEY=${SERPAPI_API_KEY}
      - BING_API_KEY=${BING_API_KEY}
      - REACT_ENABLED=${REACT_ENABLED:-true}
      - REACT_MODEL=${REACT_MODEL:-gemini/gemini-2.0-flash-exp}
      - PORT=${PORT:-8000}
      - HOST=${HOST:-0.0.0.0}
      - DEBUG=${DEBUG:-false}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: deepsearch-network
